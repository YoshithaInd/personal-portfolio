<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | Yoshitha Indeewari</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="navbar">
    <div class="logo">Yoshitha.dev</div>
    <button class="menu-toggle js-menu-toggle">☰</button>
    <nav class="nav-menu js-nav-menu">
      <a href="#hero" class="js-smooth-scroll">Home</a>
      <a href="#projects" class="js-smooth-scroll">Projects</a>
      <a href="#contact" class="js-smooth-scroll">Contact</a>
    </nav>
  </header>

  <section id="hero" class="hero-section">
    <h1>Software Engineering Student</h1>
    <p>Developing solutions with C, Java, and Web Technologies.</p>
  </header>

  <section id="projects" class="projects-section">
    <h2>My Projects</h2>
    <div class="projects-grid js-projects-grid">
      </div>
  </section>

  <section id="contact" class="contact-section">
    <h2>Contact Me</h2>
    <form class="js-contact-form">
      <input type="email" class="js-email-input" placeholder="Your Email" required>
      <textarea placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
      <p class="form-message js-form-message"></p>
    </form>
  </section>

  <script src="js/script.js" type="module"></script>
</body>
</html>
