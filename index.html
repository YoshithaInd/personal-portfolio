<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoshitha | Software Engineer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="cursor"></div>

    <header class="navbar glass">
        <div class="container flex-row">
            <div class="logo">YI<span>.</span></div>
            <nav class="nav-links js-nav">
                <a href="#hero">Home</a>
                <a href="#projects">Work</a>
                <a href="#contact">Contact</a>
            </nav>
            <div class="menu-btn js-menu-toggle"><i class="fas fa-bars"></i></div>
        </div>
    </header>

    <main>
        <section id="hero" class="hero-section v-center">
            <div class="container grid-2">
                <div class="hero-text reveal">
                    <h1>Building <span class="gradient-text">Scalable</span> Software.</h1>
                    <p>Software Engineering Undergraduate at University of Kelaniya. Focused on OOP, Java systems, and data-driven solutions.</p>
                    <div class="cta-btns">
                        <a href="#projects" class="btn-primary">View Projects</a>
                        <a href="https://github.com/YoshithaInd" target="_blank" class="btn-secondary"><i class="fab fa-github"></i> GitHub</a>
                    </div>
                </div>
                <div class="hero-img reveal">
                    <div class="img-frame">
                        <img src="assets/profile.jpeg" alt="Yoshitha Portrait">
                    </div>
                </div>
            </div>
        </section>

        <section id="projects" class="project-section">
            <div class="container">
                <h2 class="section-label reveal">Selected Works</h2>
                <div class="project-grid js-project-grid">
                    </div>
            </div>
        </section>

        <section id="contact" class="contact-section reveal">
            <div class="container contact-wrapper">
                <div class="contact-info">
                    <h2>Let's Connect.</h2>
                    <p>Open for internships and collaborative projects.</p>
                </div>
                <form class="contact-form js-form">
                    <input type="email" placeholder="Your Email" class="js-email" required>
                    <textarea placeholder="Tell me about your project" required></textarea>
                    <button type="submit" class="btn-primary">Send Message</button>
                    <p class="form-feedback js-feedback"></p>
                </form>
            </div>
        </section>
    </main>

    <script src="js/script.js" type="module"></script>
</body>
</html>
